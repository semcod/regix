[tox]
min_version = 4.0
env_list =
    py{39,310,311,312,313}
    py313-full
    lint
    type

[testenv]
deps =
    pytest>=8.0
    pytest-cov>=5.0
commands =
    pytest {posargs}

[testenv:py313-full]
deps =
    {[testenv]deps}
    lizard>=1.17
    radon>=6.0
    coverage[toml]>=7.0
commands =
    pytest --cov=regix --cov-report=term-missing {posargs}

[testenv:lint]
deps =
    ruff>=0.5.0
commands =
    ruff check regix/ tests/
    ruff format --check regix/ tests/

[testenv:type]
deps =
    mypy>=1.0
    types-PyYAML
commands =
    mypy regix/

[testenv:regix]
deps =
    {[testenv:py313-full]deps}
    .[full]
commands =
    regix check

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313, py313-full, lint, type
